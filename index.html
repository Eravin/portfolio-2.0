<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Arvin — Portfolio Dossier</title>
<style>

/* ── FONTS ── */
@font-face { font-family: 'Sofia Pro'; src: url('fonts/SofiaPro-Regular.otf') format('opentype'); font-weight: 400; }
@font-face { font-family: 'Sofia Pro'; src: url('fonts/SofiaPro-Regular.otf') format('opentype'); font-weight: 500; }
@font-face { font-family: 'Sofia Pro'; src: url('fonts/SofiaPro-Bold.otf') format('opentype'); font-weight: 600; }
@font-face { font-family: 'Lato'; src: url('fonts/Lato-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Lato'; src: url('fonts/Lato-Regular.ttf') format('truetype'); font-weight: 500; }
@font-face { font-family: 'Founders Grotesk Mono'; src: url('fonts/TestFoundersGroteskMono-Regular.otf') format('opentype'); font-weight: 400; }

/* ── THEME TOKENS ── */
:root, [data-theme="light"] {
  --bg: #E6E6DF; --bg2: #EDEDE7; --vignette: #DADAD2;
  --scan: rgba(28,27,29,0.018);
  --panel-bg: #F4F4EF; --surface: #FFFFFF;
  --header-bg: #1C1B1D; --header-fg: #FFFFFF;
  --header-fg-dim: rgba(255,255,255,0.5); --header-line: rgba(255,255,255,0.12);
  --ico-border: rgba(255,255,255,0.22);
  --frame: #1C1B1D; --frame-soft: rgba(28,27,29,0.16);
  --fg: #1C1B1D; --muted: rgba(28,27,29,0.42);
  --fill: #1C1B1D; --fill-fg: #FFFFFF;
  --accent: #7AE04D;
}
[data-theme="dark"] {
  --bg: #000000; --bg2: #111111; --vignette: #000000;
  --scan: rgba(255,255,255,0.028);
  --panel-bg: #0A0A0A; --surface: #111111;
  --header-bg: #000000; --header-fg: #ECECE4;
  --header-fg-dim: rgba(236,236,228,0.5); --header-line: rgba(236,236,228,0.13);
  --ico-border: rgba(236,236,228,0.2);
  --frame: rgba(236,236,228,0.28); --frame-soft: rgba(236,236,228,0.12);
  --fg: #D8D8D0; --muted: rgba(236,236,228,0.4);
  --fill: #ECECE4; --fill-fg: #0C0C0E;
  --accent: #8BEF5C;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body { font-family: 'Lato', sans-serif; color: var(--fg); background: var(--bg); -webkit-font-smoothing: antialiased; overflow-x: hidden; }

/* ── ROOM ── */
.room {
  position: relative; min-height: 100vh; min-height: 100dvh;
  display: flex; align-items: center; justify-content: center; padding: 40px 20px;
  background: radial-gradient(ellipse 65% 55% at 50% 45%, var(--bg2) 0%, var(--bg) 58%, var(--vignette) 100%);
  transition: background .4s;
}
.room::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image: repeating-linear-gradient(0deg, var(--scan) 0 1px, transparent 1px 4px);
}
[data-theme="dark"] .room::before {
  content: ""; position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background: radial-gradient(ellipse 100% 90% at 50% 50%, transparent 30%, rgba(0,0,0,0.82) 100%);
}

/* ── PANEL ── */
.unit { position: relative; width: 100%; max-width: 468px; z-index: 2; }
.panel { background: var(--surface); border: 1px solid var(--frame); display: flex; flex-direction: column; height: clamp(480px, calc(100vh - 80px), 660px); transition: background .3s, border-color .3s; }

/* ── HEADER ── */
.head { background: var(--header-bg); color: var(--header-fg); transition: background .3s; }
.head .bar {
  display: flex; align-items: center; gap: 10px; padding: 7px 10px 7px 12px;
  border-bottom: 1px solid var(--header-line);
  font-family: 'Founders Grotesk Mono', monospace; font-size: 10px; letter-spacing: 0.16em;
  color: var(--header-fg-dim); text-transform: uppercase;
}
.head .bar .sq { width: 8px; height: 8px; background: var(--accent); flex-shrink: 0; }
.head .bar .grow { flex: 1; }
.head .bar .sep { width: 1px; height: 11px; background: var(--header-line); }
.head .bar .tg {
  font-family: 'Founders Grotesk Mono', monospace; font-size: 10px; letter-spacing: 0.14em;
  color: var(--header-fg-dim); background: transparent; border: none; cursor: pointer;
  text-transform: uppercase; padding: 2px; transition: color .15s;
}
.head .bar .tg:hover { color: var(--accent); }
.head .meta { display: flex; align-items: center; gap: 13px; padding: 15px 14px; }
.head .id {
  width: 42px; height: 42px; flex-shrink: 0; border: 1px solid var(--ico-border);
  display: grid; place-items: center;
  font-family: 'Sofia Pro', sans-serif; font-weight: 500; font-size: 17px; color: var(--header-fg);
}
.head .who { flex: 1; min-width: 0; }
.head .who .name {
  font-family: 'Sofia Pro', sans-serif; font-weight: 500; font-size: 18px;
  letter-spacing: -0.005em; display: flex; align-items: center; gap: 9px;
}
.head .who .name .badge {
  font-family: 'Founders Grotesk Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
  color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 55%, transparent); padding: 2px 5px;
}
.head .who .role {
  font-family: 'Founders Grotesk Mono', monospace; font-size: 10.5px; letter-spacing: 0.9px;
  line-height: 1.2; color: var(--header-fg-dim); margin-top: 5px; text-transform: uppercase;
  display: flex; align-items: flex-start; gap: 7px;
}
.head .who .role .dot {
  width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
  flex-shrink: 0; margin-top: 2px; animation: pulse 2.2s steps(1) infinite;
}
@keyframes pulse { 0%,49% { opacity: 1; } 50%,100% { opacity: 0.25; } }
.head .actions { display: flex; }
.head .ico {
  width: 32px; height: 32px; border: 1px solid var(--ico-border); background: transparent;
  color: var(--header-fg-dim); cursor: pointer; display: grid; place-items: center;
  margin-left: -1px; transition: background .15s, color .15s;
}
.head .ico:hover { background: var(--header-line); color: var(--header-fg); }

/* ── MESSAGE LOG ── */
.log {
  flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: var(--panel-bg); padding: 16px 14px 10px;
  display: flex; flex-direction: column; gap: 16px;
  scrollbar-width: thin; scrollbar-color: var(--frame-soft) transparent;
  transition: background .3s;
}
.log::-webkit-scrollbar { width: 9px; }
.log::-webkit-scrollbar-thumb { background: var(--frame-soft); }
.log::-webkit-scrollbar-track { background: transparent; }

/* ── MESSAGES ── */
.msg { display: flex; flex-direction: column; gap: 6px; max-width: 86%; }
.msg .tag {
  font-family: 'Founders Grotesk Mono', monospace; font-size: 9.5px;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted);
  display: flex; align-items: center; gap: 8px;
  opacity: 0; animation: fadeUp 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
.msg .tag .read { color: var(--accent); }
.bubble {
  font-size: 14.5px; line-height: 1.5; padding: 11px 14px;
  font-family: 'Lato', sans-serif; word-wrap: break-word;
  opacity: 0; animation: fadeUp 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(7px); }
  to   { opacity: 1; transform: translateY(0); }
}
.bubble .dl {
  color: inherit; font-weight: 700; cursor: pointer; text-decoration: none;
  border-bottom: 1.5px solid var(--accent); padding-bottom: 1px;
  transition: background .14s, color .14s, border-color .14s;
}
.bubble .dl:hover { background: var(--accent); color: #0C0C0E; border-color: var(--accent); }

/* Arvin's messages */
.msg.them { align-self: flex-start; align-items: flex-start; }
.msg.them .bubble { background: var(--surface); border: 1px solid var(--frame); color: var(--fg); }
/* Visitor's messages */
.msg.me { align-self: flex-end; align-items: flex-end; }
.msg.me .tag { flex-direction: row-reverse; }
.msg.me .bubble { background: var(--fill); border: 1px solid var(--fill); color: var(--fill-fg); }

/* ── KEYWORD INPUT (password gate) ── */
.keyword-input {
  flex: 1; min-width: 0; border: none; outline: none; background: transparent;
  font-family: 'Founders Grotesk Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--fg); padding: 8px 13px; border-right: 1px solid var(--frame-soft);
}
.keyword-input::placeholder { color: var(--muted); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(12px);
  background: var(--fill); color: var(--fill-fg);
  font-family: 'Founders Grotesk Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 18px; pointer-events: none;
  opacity: 0; transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 100; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── CYCLING WORD ── */
.word-cycle { display: inline-block; position: relative; overflow: hidden; vertical-align: text-bottom; line-height: 1.2em; height: 1.2em; }
.word-slide { display: inline-block; color: var(--accent); white-space: nowrap; }
.word-slide.wc-exit { animation: wExit 0.42s cubic-bezier(0.4,0,1,1) forwards; }
.word-slide.wc-enter { position: absolute; left: 0; top: 0; animation: wEnter 0.42s cubic-bezier(0.16,1,0.3,1) forwards; }
@keyframes wExit { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-110%); } }
@keyframes wEnter { from { opacity: 0; transform: translateY(110%); } to { opacity: 1; transform: translateY(0); } }

/* ── TYPING INDICATOR ── */
.typing { display: inline-flex; gap: 5px; align-items: center; padding: 13px 14px; }
.typing i { width: 6px; height: 6px; background: var(--muted); display: block; animation: blink 1.1s steps(1) infinite; }
.typing i:nth-child(2) { animation-delay: .18s; }
.typing i:nth-child(3) { animation-delay: .36s; }
@keyframes blink { 0%,40% { opacity: 1; } 41%,100% { opacity: .2; } }

/* ── QUICK-REPLY CHIPS ── */
.quick {
  display: flex; flex-wrap: wrap;
  background: var(--panel-bg); border-top: 1px solid var(--frame-soft);
  padding: 10px 14px 12px; transition: background .3s;
}
.quick:empty { display: none; }
.chip {
  font-family: 'Founders Grotesk Mono', monospace; font-size: 11px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--fg); background: transparent; border: 1px solid var(--frame);
  padding: 8px 13px; cursor: pointer; margin: 0 -1px -1px 0;
  transition: background .14s, color .14s;
}
.chip:hover { background: var(--fill); color: var(--fill-fg); }
.chip.cta { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 18%, transparent); }
.chip.cta:hover { background: var(--accent); color: #0C0C0E; }

/* ── RESPONSIVE ── */
@media (max-width: 540px) {
  .room { padding: 0; align-items: stretch; height: 100svh; }
  .unit { width: 100%; max-width: 100%; height: 100%; display: flex; flex-direction: column; }
  .panel { flex: 1; height: 100%; min-height: 0; border: none; padding-bottom: env(safe-area-inset-bottom); }
  .head .bar { padding: 6px 10px; }
  .head .meta { padding: 12px; gap: 10px; }
  .head .id { width: 38px; height: 38px; font-size: 15px; }
  .head .who .name { font-size: 16px; }
  .head .who .role { font-size: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .head .ico { width: 40px; height: 40px; }
  .log { padding: 14px 12px 8px; gap: 14px; }
  .bubble { font-size: 14px; padding: 10px 12px; }
  .msg { max-width: 92%; }
  .chip { padding: 12px 14px; font-size: 10.5px; min-height: 44px; }
  .quick { padding: 10px 12px 12px; }
  input, textarea, select { font-size: 16px !important; }
}
@media (max-width: 374px) {
  .head .who .role { font-size: 8.5px; }
  .head .who .name { font-size: 14px; }
  .head .ico { width: 36px; height: 36px; }
  .bubble { font-size: 13.5px; }
  .chip { font-size: 10px; padding: 11px 10px; }
}
@media (max-height: 480px) and (max-width: 900px) {
  .room { padding: 0; align-items: stretch; height: 100svh; }
  .unit { max-width: 100%; height: 100%; display: flex; flex-direction: column; }
  .panel { flex: 1; height: 100%; min-height: 0; border: none; }
  .head .bar { padding: 4px 10px; }
  .head .meta { padding: 7px 12px; }
  .head .id { width: 30px; height: 30px; font-size: 12px; }
  .head .who .name { font-size: 13px; }
  .head .who .role { font-size: 8.5px; }
  .log { gap: 10px; padding: 8px 12px 6px; }
  .bubble { font-size: 13px; padding: 7px 10px; }
  .chip { padding: 9px 12px; min-height: 38px; }
  .quick { padding: 6px 12px 8px; }
}
@media (min-width: 541px) and (max-width: 860px) {
  .room { padding: 24px 20px; }
  .unit { max-width: 580px; }
  .panel { height: clamp(480px, calc(100svh - 48px), 700px); }
}
@media (min-width: 861px) {
  .unit { max-width: 468px; }
  .panel { height: clamp(520px, calc(100svh - 80px), 660px); }
}
@media (min-width: 1600px) {
  .unit { max-width: 520px; }
  .panel { height: clamp(600px, calc(100svh - 120px), 740px); }
  .bubble { font-size: 15px; }
}

</style>
</head>
<body data-theme="dark">

<div class="toast" id="toast"></div>
<div class="room">
  <div class="unit">
    <div class="panel">

      <div class="head">
        <div class="bar">
          <span class="sq"></span>
          <span id="channelLabel">DOSSIER</span>
          <span class="grow"></span>
          <span style="letter-spacing:0.14em;opacity:0.45;">2026</span>
          <span class="sep"></span>
          <button class="tg" id="themeToggle">☀ LIGHT</button>
        </div>
        <div class="meta">
          <div class="id" id="agentInitials">AR</div>
          <div class="who">
            <div class="name">
              <span id="agentName">Arvin</span>
              <span class="badge" id="agentBadge">ACTIVE</span>
            </div>
            <div class="role" id="agentRole">
              <span class="dot"></span>
              DESIGN LEADER | HEAD OF CX @PNB, KL
            </div>
          </div>
          <div class="actions">
            <button class="ico" id="emailBtn" title="Copy email" aria-label="Copy email address">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="log" id="log"></div>
      <div class="quick" id="quick"></div>

    </div>
  </div>
</div>

<script>
(function () {
  var body = document.body;
  var log  = document.getElementById('log');
  var quick = document.getElementById('quick');
  var themeToggle = document.getElementById('themeToggle');
  var toast = document.getElementById('toast');
  var toastTimer;

  /* ── Toast ── */
  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 2200);
  }

  /* ── Email → clipboard ── */
  document.getElementById('emailBtn').addEventListener('click', function () {
    var email = 'hello@typearvin.com';
    function fallbackCopy() {
      var ta = document.createElement('textarea');
      ta.value = email; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); showToast('Email address copied.'); } catch (e) {}
      document.body.removeChild(ta);
    }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(email).then(function () { showToast('Email address copied.'); }).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }
  });

  /* ── Theme ── */
  function applyTheme(t) {
    body.setAttribute('data-theme', t);
    themeToggle.textContent = t === 'dark' ? '☀ LIGHT' : '☾ DARK';
    try { localStorage.setItem('theme', t); } catch (e) {}
  }
  applyTheme((function () { try { return localStorage.getItem('theme'); } catch (e) { return null; } })() || 'dark');
  themeToggle.addEventListener('click', function () {
    applyTheme(body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });

  /* ── Helpers ── */
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function stamp() { var d = new Date(); return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
  function lbl(key, fallback) { return (copy.labels && copy.labels[key]) || fallback; }
  function setText(id, t) { var el = document.getElementById(id); if (el && t != null) el.textContent = t; }

  /* ── Copy fallback (used if copy.md fails to load) ── */
  var FALLBACK = {
    meta: { name: 'Arvin', badge: 'ACTIVE', role: 'Design Leader | Head of CX @PNB, KL', channel: 'DOSSIER' },
    intro: [
      "Hey there, you can either download the [READ.ME](uploads/readme.pdf) file about me,",
      "Or select the prompt below to experience a conversation."
    ],
    conversation: [
      { q: "Tell me a bit more about yourself", a: ["I'm a product designer", "Been at this for about ten years now — designing and launching products and services and leading the teams behind them."] },
      { q: "What's your scope of work?", a: ["I can execute large projects (with a team) or lead in-house teams, the full thing — not just managing people. I hire, I grow teams, I build the operating frameworks that make design a revenue enabler inside organisations.", "I view good design as strategic advantage."] },
      { q: "What does that look like in practice?", a: ["At PNB — Malaysia's largest asset manager — I built the CX department from the ground up. Governance, measurement, cross-departmental ownership and product design.", "We boosted our NPS +15 and baselined a CSAT of 88.56% across digital, branch, and call centre within our first year of operation. Highest in the Malaysian investment fund industry."] },
      { q: "And before that?", a: ["Jewel Digital — the innovation arm of that same institution. Built the product design org from zero. Designers, researchers, CX specialists.", "We were designing for 15 million target users. Investment platforms, onboarding, account management, design systems — the whole ecosystem."] },
      { q: "And before..before that?", a: ["At Maybank I led UX on MAE and Maybank2U — the most widely used banking apps in Malaysia.", "Before that, Fave — commerce and payments across Malaysia, Singapore and Indonesia. And earlier, dahmakan, a YC-backed food delivery startup where I was the product designer."] },
      { q: "Across which industries?", a: ["Mostly Fintech but I've worked on a number of Super-Apps, I would say my skills are industry agnostic.", "I've done both ends. The scrappy zero-to-one phase and the scaling-inside-a-giant phase. Different problems, same discipline."] },
      { q: "What exactly do you offer?", a: ["CX strategy. Product design. Service design. Design ops. Research — both product and concept. Prototyping and validation. Coaching and training.", "Honestly, I do what a design department does. I'm just not a design department — though I usually end up leading one."] },
      { q: "Where are you based?", a: ["Kuala Lumpur. But I've worked across Singapore, Jakarta, Oslo and Germany.", "The work has always been regional."] },
      { q: "How do we find out if we're a good fit?", a: ["Give me 15 minutes. Reach out and we'll figure it out from there."] }
    ],
    closing: { 'chip-cta': 'Book 15 minutes', 'chip-restart': 'Restart', 'user-cta': "Let's book 15 minutes.", reply: ["Perfect. Grab a slot — typearvin.com/intro", "Talk soon."] },
    labels: { typing: 'ARVIN · TRANSMITTING', 'read-marker': 'READ', 'you-label': 'YOU', 'arvin-label': 'ARVIN' }
  };

  /* ── copy.md parser ── */
  function parseCopy(md) {
    var out = { meta: {}, intro: [], conversation: [], closing: { reply: [] }, labels: {} };
    var section = null, curQ = null;
    md.split(/\r?\n/).forEach(function (raw) {
      var line = raw.trim();
      if (!line || /^#[^#]/.test(line) || line === '#') return; // skip blanks & comments
      if (/^##\s+/.test(line)) { section = line.replace(/^##\s+/, '').toLowerCase().trim(); curQ = null; return; }
      if (!section) return;
      if (/^###\s+/.test(line)) {
        if (section === 'conversation') { curQ = { q: line.replace(/^###\s+/, '').trim(), a: [] }; out.conversation.push(curQ); }
        return;
      }
      var kv = line.match(/^([a-z][a-z0-9-]*):\s*(.+)$/i);
      if (kv) {
        var key = kv[1], val = kv[2].trim();
        if (section === 'meta') out.meta[key] = val;
        else if (section === 'labels') out.labels[key] = val;
        else if (section === 'closing') out.closing[key] = val;
        return;
      }
      if (section === 'intro') out.intro.push(line);
      else if (section === 'conversation' && curQ) curQ.a.push(line);
      else if (section === 'closing') out.closing.reply.push(line);
    });
    return out.conversation.length ? out : FALLBACK;
  }

  /* ── State ── */
  var copy = FALLBACK, convo = [], step = 0, finished = false;
  var cycleTimers = [];

  /* ── Apply copy to the page ── */
  function applyCopy(c) {
    copy = c;
    convo = c.conversation || [];
    var m = c.meta || {};
    setText('agentName', m.name);
    setText('agentBadge', m.badge);
    setText('channelLabel', m.channel);
    if (m.name) setText('agentInitials', m.name.replace(/[^A-Za-z]/g, '').slice(0, 2).toUpperCase());
    var roleEl = document.getElementById('agentRole');
    if (roleEl && m.role) {
      var dot = roleEl.querySelector('.dot');
      roleEl.innerHTML = '';
      if (dot) roleEl.appendChild(dot);
      roleEl.appendChild(document.createTextNode(' ' + m.role.toUpperCase()));
    }
  }

  /* ── Rendering ── */
  function renderRich(el, text) {
    if (/\bproduct\b/.test(text)) {
      var i = text.indexOf('product');
      if (text.slice(0, i)) el.appendChild(document.createTextNode(text.slice(0, i)));
      var wrap = document.createElement('span'); wrap.className = 'word-cycle';
      var inner = document.createElement('span'); inner.className = 'word-slide'; inner.textContent = 'product';
      wrap.appendChild(inner);
      requestAnimationFrame(function () { wrap.style.width = inner.scrollWidth + 'px'; startWordCycle(wrap, inner); });
      el.appendChild(wrap);
      if (text.slice(i + 7)) el.appendChild(document.createTextNode(text.slice(i + 7)));
      return;
    }
    var re = /\[([^\]]+)\]\(([^)]+)\)/g, last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) el.appendChild(document.createTextNode(text.slice(last, m.index)));
      var a = document.createElement('a');
      a.className = 'dl'; a.textContent = m[1]; a.href = m[2];
      a.setAttribute('download', ''); a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener');
      a.addEventListener('click', function (e) {
        e.preventDefault();
        if ((copy.meta && copy.meta['password-gate']) === 'on') {
          requestPassword(this.href);
        } else {
          var tmp = document.createElement('a');
          tmp.href = this.href; tmp.setAttribute('download', ''); tmp.setAttribute('target', '_blank');
          document.body.appendChild(tmp); tmp.click(); document.body.removeChild(tmp);
        }
      });
      el.appendChild(a);
      last = m.index + m[0].length;
    }
    if (last < text.length) el.appendChild(document.createTextNode(text.slice(last)));
  }

  function makeBubble(text, delay) {
    var b = document.createElement('div');
    b.className = 'bubble';
    b.style.animationDelay = delay + 'ms';
    renderRich(b, text);
    return b;
  }

  function addMessage(side, texts) {
    var row = document.createElement('div'); row.className = 'msg ' + side;
    var tag = document.createElement('div'); tag.className = 'tag';
    var label = document.createElement('span');
    label.textContent = (side === 'me' ? lbl('you-label', 'YOU') : lbl('arvin-label', 'ARVIN')) + ' · ' + stamp();
    tag.appendChild(label);
    if (side === 'me') {
      var read = document.createElement('span'); read.className = 'read';
      read.textContent = lbl('read-marker', 'READ');
      tag.appendChild(read);
    }
    row.appendChild(tag);
    row.appendChild(makeBubble(texts[0], 0));
    log.appendChild(row);
    scrollDown();
    texts.slice(1).forEach(function (t, i) {
      setTimeout(function () { row.appendChild(makeBubble(t, 0)); scrollDown(); }, (i + 1) * 620);
    });
    return row;
  }

  function scrollDown() { log.scrollTop = log.scrollHeight; }

  function showTyping() {
    var row = document.createElement('div'); row.className = 'msg them'; row.id = 'typing-row';
    var tag = document.createElement('div'); tag.className = 'tag';
    var ts = document.createElement('span'); ts.textContent = lbl('typing', 'ARVIN · TRANSMITTING');
    tag.appendChild(ts);
    var b = document.createElement('div'); b.className = 'bubble typing'; b.innerHTML = '<i></i><i></i><i></i>';
    row.appendChild(tag); row.appendChild(b);
    log.appendChild(row); scrollDown();
  }
  function hideTyping() { var t = document.getElementById('typing-row'); if (t) t.remove(); }

  /* ── Password gate ── */
  function requestPassword(href) {
    addMessage('them', [lbl('password-prompt', "What's the access keyword?")]);
    quick.innerHTML = '';
    var input = document.createElement('input');
    input.type = 'text'; input.className = 'keyword-input';
    input.placeholder = lbl('password-placeholder', 'Enter keyword…');
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('autocorrect', 'off');
    input.setAttribute('autocapitalize', 'off');
    var btn = document.createElement('button');
    btn.className = 'chip cta'; btn.textContent = '→';
    quick.appendChild(input); quick.appendChild(btn);
    setTimeout(function () { input.focus(); }, 50);

    function attempt() {
      var val = input.value.trim().toLowerCase();
      var pw = (copy.meta && copy.meta.password || '').trim().toLowerCase();
      if (pw && val === pw) {
        quick.innerHTML = '';
        var a = document.createElement('a');
        a.href = href; a.setAttribute('download', ''); a.setAttribute('target', '_blank');
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        addMessage('them', [lbl('password-success', 'Here you go.')]);
        setTimeout(refreshQuick, 600);
      } else {
        input.value = '';
        addMessage('them', [lbl('password-fail', "That's not it. Try again.")]);
        setTimeout(function () { input.focus(); }, 50);
      }
    }
    btn.addEventListener('click', attempt);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter') attempt(); });
  }

  /* ── Booking context (company vs individual) ── */
  function requestBookingContext(url) {
    addMessage('them', [lbl('booking-context-prompt', 'One quick thing — are you reaching out on behalf of a company?')]);
    quick.innerHTML = '';
    function openUrl(base, company) {
      var final = company ? base + (base.indexOf('?') >= 0 ? '&' : '?') + 'notes=' + encodeURIComponent(company) : base;
      window.open(final, '_blank');
    }
    function makeChip(text, onClick) {
      var c = document.createElement('button');
      c.className = 'chip'; c.textContent = text;
      c.addEventListener('click', onClick); quick.appendChild(c);
    }
    makeChip(lbl('booking-company-chip', 'From a company'), function () {
      quick.innerHTML = '';
      var input = document.createElement('input');
      input.type = 'text'; input.className = 'keyword-input';
      input.placeholder = lbl('booking-company-input', "What's your company called?");
      input.setAttribute('autocomplete', 'off'); input.setAttribute('autocorrect', 'off'); input.setAttribute('autocapitalize', 'words');
      var btn = document.createElement('button'); btn.className = 'chip cta'; btn.textContent = '→';
      quick.appendChild(input); quick.appendChild(btn);
      setTimeout(function () { input.focus(); }, 50);
      function submit() {
        var name = input.value.trim(); if (!name) return;
        quick.innerHTML = '';
        addMessage('them', [lbl('booking-company-reply', 'Thanks for reaching out, talk soon!')]);
        setTimeout(function () { openUrl(url, name); }, 600);
      }
      btn.addEventListener('click', submit);
      input.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    });
    makeChip(lbl('booking-individual-chip', 'Individual inquiry'), function () {
      quick.innerHTML = '';
      addMessage('them', [lbl('booking-individual-reply', 'Thanks for reaching out, talk soon!')]);
      setTimeout(function () { openUrl(url, ''); }, 600);
    });
  }

  /* ── Chips ── */
  function setQuick(items) {
    quick.innerHTML = '';
    items.forEach(function (it) {
      var c = document.createElement('button');
      c.className = 'chip' + (it.cta ? ' cta' : '');
      c.textContent = it.t;
      c.addEventListener('click', function () { onChip(it.t); });
      quick.appendChild(c);
    });
  }

  function refreshQuick() {
    if (step < convo.length) {
      setQuick([{ t: convo[step].q }]);
    } else if (!finished) {
      finished = true;
      setQuick([{ t: copy.closing['chip-cta'], cta: true }, { t: copy.closing['chip-restart'] }]);
    }
  }

  function onChip(text) {
    if (finished && text === copy.closing['chip-cta']) {
      addMessage('me', [copy.closing['user-cta']]);
      setQuick([]);
      showTyping();
      setTimeout(function () {
        hideTyping();
        addMessage('them', copy.closing.reply);
        var url = copy.closing['booking-url'];
        if (url) setTimeout(function () { requestBookingContext(url); }, copy.closing.reply.length * 620 + 400);
      }, 1100);
      return;
    }
    if (finished && text === copy.closing['chip-restart']) { reset(); return; }
    sendMine(text);
  }

  function sendMine(text) {
    if (!text || step >= convo.length) return;
    var answer = convo[step].a;
    addMessage('me', [text]);
    step++;
    setQuick([]);
    showTyping();
    var delay = Math.min(850 + answer.join(' ').length * 8 + Math.random() * 350, 2500);
    setTimeout(function () { hideTyping(); addMessage('them', answer); refreshQuick(); }, delay);
  }

  function reset() {
    cycleTimers.forEach(clearInterval); cycleTimers = [];
    log.innerHTML = ''; step = 0; finished = false; seed();
  }

  /* ── Cycling word ── */
  var CYCLE_WORDS = ['product', 'service', 'experience', 'interface'];
  function startWordCycle(wrap, inner) {
    var idx = 0;
    var tid = setInterval(function () {
      idx = (idx + 1) % CYCLE_WORDS.length;
      inner.classList.add('wc-exit');
      var next = document.createElement('span'); next.className = 'word-slide wc-enter'; next.textContent = CYCLE_WORDS[idx]; next.style.opacity = '0';
      wrap.appendChild(next);
      setTimeout(function () {
        wrap.style.width = next.scrollWidth + 'px'; next.style.opacity = '';
        setTimeout(function () { inner.remove(); next.classList.remove('wc-enter'); next.style.cssText = ''; inner = next; }, 440);
      }, 20);
    }, 2000);
    cycleTimers.push(tid);
  }

  /* ── Boot ── */
  function seed() { addMessage('them', copy.intro); setTimeout(refreshQuick, 500); }
  function start(c) { applyCopy(c); seed(); }

  fetch('copy.md', { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error(); return r.text(); })
    .then(function (md) { start(parseCopy(md)); })
    .catch(function () { start(FALLBACK); });

})();
</script>
</body>
